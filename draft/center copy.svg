<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <rect width="100" height="100" fill="#ffffff" fill-opacity="0.5"/>
  
  <defs>
    <!-- 你的花瓣 -->
    <path id="item" d="M55 15 A30 30 0 0 0 25 45 A5 5 0 0 0 35 45 A20 20 0 0 1 55 25 A5 5 0 0 1 55 15 Z"/>
    
    <!-- 正确的裁剪区域：切分花瓣，实现互相压住 -->
    <clipPath id="front">
      <path d="M50,50 L100,50 A50,50 0 0 1 50,100 Z" />
    </clipPath>
    <clipPath id="back">
      <path d="M50,50 L100,50 A50,50 0 0 1 50,0 Z" />
    </clipPath>
  </defs>

  <circle cx="50" cy="50" r="1" fill="#ff0000"/>

  <!-- 先画所有 后半部分 -->
  <use href="#item" fill="#ff0000" transform="rotate(0 50 50)" clip-path="url(#back)"/>
  <use href="#item" fill="#00ff00" transform="rotate(60 50 50)" clip-path="url(#back)"/>
  <use href="#item" fill="#0000ff" transform="rotate(120 50 50)" clip-path="url(#back)"/>
  <use href="#item" fill="#ff0000" transform="rotate(180 50 50)" clip-path="url(#back)"/>
  <use href="#item" fill="#00ff00" transform="rotate(240 50 50)" clip-path="url(#back)"/>
  <use href="#item" fill="#0000ff" transform="rotate(300 50 50)" clip-path="url(#back)"/>

  <!-- 再画所有 前半部分，实现循环压住 -->
  <use href="#item" fill="#ff0000" transform="rotate(0 50 50)" clip-path="url(#front)"/>
  <use href="#item" fill="#00ff00" transform="rotate(60 50 50)" clip-path="url(#front)"/>
  <use href="#item" fill="#0000ff" transform="rotate(120 50 50)" clip-path="url(#front)"/>
  <use href="#item" fill="#ff0000" transform="rotate(180 50 50)" clip-path="url(#front)"/>
  <use href="#item" fill="#00ff00" transform="rotate(240 50 50)" clip-path="url(#front)"/>
  <use href="#item" fill="#0000ff" transform="rotate(300 50 50)" clip-path="url(#front)"/>
</svg>