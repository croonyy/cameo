M251.566 426.801 A253.602 253.602 0 0 0 505.168 173.199
"
            fill="#012772" stroke="#00ffff"
            stroke-width="0"
            stroke-linecap="round" />
        <g fill="#00ffff"><circle cx="221.631" cy="203.132" r="5.987" />
<circle cx="143.264" cy="221.633" r="9.687" />
