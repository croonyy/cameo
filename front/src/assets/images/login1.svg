    <path d="M80 690 L404 430 L980 430 L1308 690"/>
    <path d="M212 690 L468 430"/>
    <path d="M344 690 L532 430"/>
    <path d="M476 690 L596 430"/>
    <path d="M608 690 L660 430"/>
    <path d="M740 690 L724 430"/>
    <path d="M872 690 L788 430"/>
    <path d="M1004 690 L852 430"/>
    <path d="M1136 690 L916 430"/>
    <path d="M1268 690 L980 430"/>
    <path d="M166 620 L1222 620"/>
    <path d="M250 560 L1138 560"/>
    <path d="M332 505 L1056 505"/>
    <path d="M404 430 L980 430"/>
  </g>

  <g class="scan-line" opacity="0.75">
    <rect x="0" y="0" width="1361" height="96" fill="url(#scan-fill)"/>
    <path d="M0 58 H1361" stroke="#00f5ff" stroke-width="1" opacity="0.34"/>
  </g>

  <g fill="none" stroke-linecap="round" filter="url(#soft-glow)">
    <path d="M260 520 C420 250 560 335 686 374" stroke="#163a85" stroke-width="4" opacity="0.3"/>
    <path d="M260 520 C420 250 560 335 686 374" stroke="url(#line-cyan)" stroke-width="2" class="stream-fast"/>
    <path d="M781 374 C916 220 1028 210 1110 214" stroke="#163a85" stroke-width="4" opacity="0.28"/>
    <path d="M781 374 C916 220 1028 210 1110 214" stroke="url(#line-cyan)" stroke-width="2" class="stream-slow"/>
    <path d="M740 430 C900 560 1044 514 1214 586" stroke="#ff2ac6" stroke-width="1.5" opacity="0.55" class="stream-fast"/>
    <path d="M348 604 C512 690 676 612 814 642" stroke="#00f5ff" stroke-width="1.3" opacity="0.4" class="stream-slow"/>
  </g>

  <g class="float-a">
    <circle cx="730" cy="374" r="136" fill="url(#core-fill)" opacity="0.86"/>
    <circle cx="730" cy="374" r="96" fill="none" stroke="#00f5ff" stroke-width="1.5" opacity="0.36"/>
    <circle cx="730" cy="374" r="64" fill="#001426" fill-opacity="0.18" stroke="#83f7ff" stroke-width="1.2" opacity="0.78"/>
    <circle cx="730" cy="374" r="18" fill="#f7ffff" filter="url(#strong-glow)" opacity="0.9"/>
    <g class="core-cw" fill="none">
      <circle cx="730" cy="374" r="176" stroke="#00f5ff" stroke-width="2" opacity="0.56" stroke-dasharray="115 42 16 36"/>
      <circle cx="730" cy="374" r="124" stroke="#ff2ac6" stroke-width="1.4" opacity="0.55" stroke-dasharray="70 26 12 32"/>
      <path d="M554 374 H606 M854 374 H906 M730 198 V250 M730 498 V550" stroke="#8dfbff" stroke-width="2" opacity="0.62"/>
    </g>
    <g class="core-ccw" fill="none">
      <ellipse cx="730" cy="374" rx="228" ry="82" stroke="#00f5ff" stroke-width="1.2" opacity="0.52" stroke-dasharray="36 18"/>
      <ellipse cx="730" cy="374" rx="82" ry="228" stroke="#88a8ff" stroke-width="1" opacity="0.34" stroke-dasharray="22 20"/>
      <path d="M642 286 L730 242 L824 286 L824 462 L730 506 L642 462 Z" stroke="#00f5ff" stroke-width="1.2" opacity="0.46"/>
    </g>
    <g filter="url(#soft-glow)">
      <circle cx="642" cy="286" r="5" fill="#00f5ff" class="node"/>
      <circle cx="824" cy="286" r="5" fill="#ff2ac6" class="node-pink"/>
      <circle cx="824" cy="462" r="5" fill="#00f5ff" class="node"/>
      <circle cx="642" cy="462" r="5" fill="#ff2ac6" class="node-pink"/>
    </g>
  </g>

  <g class="float-b" transform="translate(1086 184)">
    <circle cx="24" cy="30" r="92" fill="url(#magenta-fill)" opacity="0.8"/>
    <g class="orbital-right" fill="none">
      <ellipse cx="24" cy="30" rx="142" ry="48" stroke="#ff2ac6" stroke-width="2" opacity="0.52" stroke-dasharray="104 38"/>
      <ellipse cx="24" cy="30" rx="108" ry="32" stroke="#00f5ff" stroke-width="1.3" opacity="0.38" stroke-dasharray="20 14"/>
    </g>
    <path d="M-52 0 H18 L38 20 H104" stroke="#ff2ac6" stroke-width="1.2" opacity="0.52"/>
    <path d="M-28 76 H44 L64 56 H122" stroke="#00f5ff" stroke-width="1.2" opacity="0.45"/>
    <circle cx="24" cy="30" r="22" fill="#ff2ac6" opacity="0.72" filter="url(#strong-glow)"/>
  </g>

  <g class="float-a" transform="translate(206 454)">
    <circle cx="88" cy="80" r="108" fill="url(#core-fill)" opacity="0.45"/>
    <g class="orbital-left" fill="none">
      <circle cx="88" cy="80" r="124" stroke="#00f5ff" stroke-width="1.4" opacity="0.36" stroke-dasharray="8 12"/>
      <path d="M8 44 L80 -24 L184 16 L210 120 L134 196 L24 158 Z" stroke="#00f5ff" stroke-width="1.4" opacity="0.5"/>
      <path d="M8 44 L106 88 L184 16 M80 -24 L106 88 L134 196 M106 88 L24 158" stroke="#ff2ac6" stroke-width="1" opacity="0.34"/>
    </g>
    <g filter="url(#soft-glow)">
      <circle cx="8" cy="44" r="4" fill="#00f5ff" class="node"/>
      <circle cx="106" cy="-24" r="4" fill="#00f5ff" class="node"/>
      <circle cx="184" cy="16" r="4" fill="#ff2ac6" class="node-pink"/>
      <circle cx="210" cy="120" r="5" fill="#ff2ac6" class="node-pink"/>
      <circle cx="134" cy="196" r="4" fill="#00f5ff" class="node"/>
      <circle cx="24" cy="158" r="4" fill="#00f5ff" class="node"/>
    </g>
  </g>

  <g opacity="0.76">
    <g transform="translate(906 462)">
      <path d="M0 0 H220 L252 32 V132 H28 L0 104 Z" fill="url(#panel-fill)" stroke="#00f5ff" stroke-width="1" opacity="0.76"/>
      <path d="M24 30 H128 M24 54 H196 M24 78 H160" stroke="#8dfbff" stroke-width="1" opacity="0.52"/>
      <path d="M186 20 H226 V58 H186 Z" fill="none" stroke="#ff2ac6" stroke-width="1" opacity="0.62"/>
      <text x="24" y="112" class="txt">SYS::AUTH_GATE</text>
      <text x="186" y="83" class="txt-soft">93.7%</text>
    </g>
    <g transform="translate(428 130)">
      <path d="M0 0 H178 L202 24 V88 H20 L0 68 Z" fill="url(#panel-fill)" stroke="#88a8ff" stroke-width="1" opacity="0.56"/>
      <path d="M20 28 H86 M20 48 H152 M20 68 H118" stroke="#00f5ff" stroke-width="1" opacity="0.45"/>
      <text x="20" y="18" class="txt-soft">NEURAL LINK</text>
    </g>
    <g transform="translate(1014 96)" class="flicker">
      <path d="M0 0 H120 M0 18 H76 M0 36 H98" stroke="#ff2ac6" stroke-width="1.2"/>
      <text x="0" y="60" class="txt">0x7F_SYNC</text>
    </g>
  </g>
</svg>
