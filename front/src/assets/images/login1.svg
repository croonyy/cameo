<svg xmlns="http://www.w3.org/2000/svg" width="1361px" height="750px" viewBox="0 0 1361 750" version="1.1">
  <style>
    @keyframes pulse {
      0%, 100% { opacity: 0.42; filter: drop-shadow(0 0 4px rgba(0, 245, 255, 0.35)); }
      50% { opacity: 1; filter: drop-shadow(0 0 16px rgba(0, 245, 255, 0.92)); }
    }

    @keyframes pulse-pink {
      0%, 100% { opacity: 0.36; filter: drop-shadow(0 0 4px rgba(255, 42, 198, 0.32)); }
      50% { opacity: 0.92; filter: drop-shadow(0 0 18px rgba(255, 42, 198, 0.8)); }
    }

    @keyframes rotate-cw {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes rotate-ccw {
      from { transform: rotate(360deg); }
      to { transform: rotate(0deg); }
    }

    @keyframes stream {
      to { stroke-dashoffset: -72; }
    }

    @keyframes scan {
      0% { transform: translateY(-140px); opacity: 0; }
      15%, 78% { opacity: 0.75; }
      100% { transform: translateY(720px); opacity: 0; }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-14px); }
    }

    @keyframes flicker {
      0%, 100% { opacity: 0.32; }
      45% { opacity: 0.86; }
      52% { opacity: 0.2; }
      60% { opacity: 0.74; }
    }

    .core-cw { transform-origin: 730px 374px; animation: rotate-cw 28s linear infinite; }
    .core-ccw { transform-origin: 730px 374px; animation: rotate-ccw 19s linear infinite; }
    .orbital-right { transform-origin: 24px 30px; animation: rotate-cw 24s linear infinite; }
    .orbital-left { transform-origin: 88px 80px; animation: rotate-ccw 31s linear infinite; }
    .stream-fast { stroke-dasharray: 14 8; animation: stream 1.8s linear infinite; }
    .stream-slow { stroke-dasharray: 8 12; animation: stream 3.4s linear infinite reverse; }
    .node { animation: pulse 3.4s ease-in-out infinite; }
    .node-pink { animation: pulse-pink 3s ease-in-out infinite; }
    .scan-line { animation: scan 5.6s ease-in-out infinite; }
    .float-a { animation: float 4.8s ease-in-out infinite; }
    .float-b { animation: float 5.6s ease-in-out 0.8s infinite; }
    .flicker { animation: flicker 2.8s steps(1, end) infinite; }
    .txt { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 11px; letter-spacing: 0; fill: #8dfbff; }
    .txt-soft { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 10px; letter-spacing: 0; fill: #88a8ff; opacity: 0.62; }
  </style>

  <defs>
    <linearGradient id="scene-bg" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#030816"/>
      <stop offset="42%" stop-color="#081a32"/>
      <stop offset="72%" stop-color="#0b1024"/>
      <stop offset="100%" stop-color="#160722"/>
    </linearGradient>
    <radialGradient id="bg-cyan-bloom" cx="58%" cy="48%" r="58%">
      <stop offset="0%" stop-color="#00f5ff" stop-opacity="0.18"/>
      <stop offset="52%" stop-color="#005dff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#001326" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bg-pink-bloom" cx="86%" cy="18%" r="42%">
      <stop offset="0%" stop-color="#ff2ac6" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#ff2ac6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ambient-cyan" cx="54%" cy="48%" r="58%">
      <stop offset="0%" stop-color="#00f5ff" stop-opacity="0.28"/>
      <stop offset="42%" stop-color="#005dff" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#001326" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ambient-magenta" cx="82%" cy="22%" r="38%">
      <stop offset="0%" stop-color="#ff2ac6" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#ff2ac6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="core-fill" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f7ffff" stop-opacity="0.9"/>
      <stop offset="22%" stop-color="#00f5ff" stop-opacity="0.78"/>
      <stop offset="70%" stop-color="#005dff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#001326" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="magenta-fill" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe6fb" stop-opacity="0.82"/>
      <stop offset="42%" stop-color="#ff2ac6" stop-opacity="0.64"/>
      <stop offset="100%" stop-color="#ff2ac6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="line-cyan" x1="0%" x2="100%" y1="0%" y2="0%">
      <stop offset="0%" stop-color="#00f5ff" stop-opacity="0"/>
      <stop offset="42%" stop-color="#00f5ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ff2ac6" stop-opacity="0.72"/>
    </linearGradient>
    <linearGradient id="panel-fill" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#00f5ff" stop-opacity="0.11"/>
      <stop offset="100%" stop-color="#ff2ac6" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="scan-fill" x1="0%" x2="0%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#00f5ff" stop-opacity="0"/>
      <stop offset="45%" stop-color="#00f5ff" stop-opacity="0.26"/>
      <stop offset="100%" stop-color="#00f5ff" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft-glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="strong-glow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1361" height="750" fill="url(#scene-bg)"/>
  <rect width="1361" height="750" fill="url(#bg-cyan-bloom)"/>
  <rect width="1361" height="750" fill="url(#bg-pink-bloom)"/>
  <circle cx="720" cy="360" r="610" fill="url(#ambient-cyan)"/>
  <circle cx="1080" cy="185" r="350" fill="url(#ambient-magenta)"/>

  <g opacity="0.34" fill="#eaffff">
    <circle cx="86" cy="92" r="1.1"/><circle cx="174" cy="248" r="1.4"/><circle cx="286" cy="118" r="1"/>
    <circle cx="422" cy="214" r="1.2"/><circle cx="604" cy="86" r="1"/><circle cx="762" cy="156" r="1.4"/>
    <circle cx="928" cy="88" r="1.2"/><circle cx="1220" cy="98" r="1.4"/><circle cx="1302" cy="286" r="1"/>
    <circle cx="108" cy="632" r="1.2"/><circle cx="418" cy="662" r="1"/><circle cx="592" cy="596" r="1.4"/>
    <circle cx="846" cy="684" r="1.1"/><circle cx="1128" cy="620" r="1.4"/><circle cx="1276" cy="538" r="1"/>
  </g>

